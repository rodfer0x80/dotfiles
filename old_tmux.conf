 # vi controls
setw -g mode-keys vi
 
# remap prefix from 'C-b' to 'C-z'
unbind C-b
set-option -g prefix C-z
bind-key C-z send-prefix

# split panes using and - for horizontal and = for vertical
bind q killp
bind = split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# don't rename windows automatically
set-option -g allow-rename off

# history
set-option -g history-limit 5000

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

#  modes
setw -g clock-mode-colour colour255
setw -g mode-style 'fg=colour255 bg=colour1 bold'

# panes
set -g pane-border-style 'fg=colour255 bg=colour1'
set -g pane-active-border-style 'bg=colour1 fg=colour255'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour238, fg=colour255 bold'
set -g status-left ''
set -g status-right '#[fg=colour255,bg=colour243] %d/%m #[fg=colour255,bg=colour1] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour255 bg=colour1 bold'
setw -g window-status-current-format ' #I#[fg=colour255]:#[fg=colour255]#W#[fg=colour255]#F '

setw -g window-status-style 'fg=colour255 bg=colour255'
setw -g window-status-format ' #I#[fg=colour255]:#[fg=colour255]#W#[fg=colour255]#F '

setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# messages
set -g message-style 'fg=colour255 bg=colour255 bold'
